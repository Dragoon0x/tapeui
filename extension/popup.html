<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TAPE</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        background: #0f1216;
        color: #e6e8eb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 13px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 14px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #f59e0b;
      }
      p {
        margin: 0 0 14px;
        color: #9aa3ad;
        line-height: 1.5;
      }
      button {
        width: 100%;
        background: #f59e0b;
        color: #0b0d10;
        border: none;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      kbd {
        background: #13171c;
        border: 1px solid #22272e;
        border-radius: 3px;
        padding: 1px 6px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11px;
      }
      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: #5b6370;
      }
    </style>
  </head>
  <body>
    <h1>● TAPE</h1>
    <p>Record design critiques on this page.</p>
    <button id="toggle">Open TAPE on this page</button>
    <div class="hint">Or press <kbd>Alt</kbd>+<kbd>T</kbd> on the page.</div>
    <script src="popup.js"></script>
  </body>
</html>
